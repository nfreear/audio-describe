<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<link rel="stylesheet" href="assets/style.css">

<title> Synthesised & Extended Audio Description — Video.js Demo </title>

<header>
  <h1> Synthesised & Extended Audio Description </h1>
  <h2> Video.js demo </h2>
</header>

<main>

<p>This demo uses the <a href="https://www.media-chrome.org/docs/en/media-elements/videojs-video">&lt;videojs-video></a> custom element for <a href="https://videojs.org/">Video.js</a>, with an API that matches the <code>&lt;video></code> API.</p>


<demo-app vendor-vtt media-selector="videojs-video" default-id="mux:coffee">

<p role="alert"></p>

<voice-select locale="en-(gb|ie|au)">Loading voices…</voice-select>

<audio-describe-controller controls media-selector="videojs-video">
  <media-controller>
    <videojs-video crossorigin controls>
      <track kind="descriptions">
      <p>Loading video…</p>
    </videojs-video>
  </media-controller>
</audio-describe-controller>

</demo-app>

</main>

<footer>
  <p>About & code: <a href="https://github.com/nfreear/audio-describe#readme">@nfreear/audio-describe</a></p>
</footer>


<script type="importmap">
{
  "imports": {
    "videojs-video-element": "https://cdn.jsdelivr.net/npm/videojs-video-element@1.2/+esm",
    "@plussub/srt-vtt-parser": "https://unpkg.com/@plussub/srt-vtt-parser@^2/dist/index.js",
    "ndf-elements/my-include": "https://nfreear.github.io/elements/src/components/MyIncludeElement.js",
    "vtt-data": "https://nfreear.github.io/vtt-data/index.js"
  }
}
</script>

<script type="module" src="lib/app.js"></script>

</html>
