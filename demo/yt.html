<script type="XX_module">
  import YTPlayer from '../src/util/YoutubePlayer.js';

  const ELEM = document.querySelector('#player');

  runPlayer();

  async function runPlayer () {
    const player = new YTPlayer(ELEM, {
      url: 'https://youtu.be/M7lc1UVf-VE',
      // videoId: 'M7lc1UVf-VE'
    });

    player.on('timeupdate', (ev) => console.debug('timeupdate:', ev));

    await player.ready();
    console.debug('Ready!!');
  }
</script>
