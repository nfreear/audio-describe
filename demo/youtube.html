<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<link rel="shortcut icon" href="#">
<link rel="stylesheet" href="assets/style.css">

<title> Synthesised & Extended Audio Description — YouTube Demo </title>

<header>
  <h1> Synthesised & Extended Audio Description </h1>
  <h2> YouTube demo </h2>
</header>

<main>

<demo-app vendor-vtt media-chrome media-selector="youtube-video" default-id="yt:uncrpd1">

<p role="alert"></p>

<voice-select locale="en-(gb|ie|au)">Loading voices…</voice-select>

<audio-describe-controller>
  <media-controller>
    <youtube-video slot="media" src crossorigin X_controls >
      <track kind="descriptions" srclang="en" src>
      <p>Loading video…</p>
      <a href="https://youtu.be/tO01J-M3g0U">Video on YouTube</a>
    </youtube-video>
    <media-control-bar>
      <media-play-button></media-play-button>
      <media-mute-button></media-mute-button>
      <media-time-range></media-time-range>
      <media-time-display showduration remaining></media-time-display>
    </media-control-bar>
  </media-controller>
</audio-describe-controller>

</demo-app>

</main>

<footer>
  <p>About & code: <a href="https://github.com/nfreear/audio-describe#readme">@nfreear/audio-describe</a></p>
</footer>


<script type="importmap">
{
  "imports": {
    "youtube-video-element": "https://cdn.jsdelivr.net/npm/youtube-video-element@1.1/+esm",
    "media-chrome": "https://cdn.jsdelivr.net/npm/media-chrome@4/+esm",
    "@plussub/srt-vtt-parser": "https://unpkg.com/@plussub/srt-vtt-parser@^2/dist/index.js",
    "vtt-data": "https://nfreear.github.io/vtt-data/index.js"
  }
}
</script>

<script type="module" src="lib/app.js"></script>

</html>
