<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

<link rel="stylesheet" href="assets/style.css">

<title> Synthesised & Extended Audio Description — Vimeo Demo </title>

<header>
  <h1> Synthesised & Extended Audio Description </h1>
  <h2> Vimeo demo </h2>
</header>

<main>

<p>This demo uses the <a href="https://www.media-chrome.org/docs/en/media-elements/vimeo-video">&lt;vimeo-video></a> custom element for the Vimeo player, with an API that matches the <code>&lt;video></code> API.</p>

<voice-select locale="en-(gb|ie|au)">Loading voices…</voice-select>

<audio-describe-controller>
  <vimeo-video src="https://vimeo.com/1006361470" crossorigin controls>
    <track kind="descriptions" srclang="en" src="../tracks/sailing-bib-bear.ext-ad.en.vtt">
    <p>Loading video…</p>
    <a href="https://vimeo.com/1006361470">Demo video</a>
  </vimeo-video>
</audio-describe-controller>

</main>

<footer>
  <p>About & code: <a href="https://github.com/nfreear/audio-describe#readme">@nfreear/audio-describe</a></p>
</footer>


<script type="importmap">
{
  "imports": {
    "vimeo-video-element": "https://cdn.jsdelivr.net/npm/vimeo-video-element@1.1/+esm",
    "@plussub/srt-vtt-parser": "https://esm.sh/@plussub/srt-vtt-parser@^2",
    "audio-describe": "../index.js"
  }
}
</script>


<script type="module">
  import 'vimeo-video-element';
  import { AudioDescribeElement, VoiceSelectElement } from 'audio-describe';

  customElements.define('audio-describe-controller', AudioDescribeElement);
  customElements.define('voice-select', VoiceSelectElement);
</script>

</html>
